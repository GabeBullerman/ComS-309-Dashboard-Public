spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: class-dashboard
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://coms-4020-006.class.las.iastate.edu:5432/class_dashboard}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
