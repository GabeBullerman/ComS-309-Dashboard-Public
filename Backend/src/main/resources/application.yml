spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: class-dashboard
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/class_dashboard}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  web:
    resources:
      cache:
        period: 0
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:ComS.309.Dashboard@gmail.com}
    password: ${MAIL_PASSWORD:zjrhqkdxyheriihl}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

app:
  frontend-url: ${FRONTEND_URL:http://coms-4020-006.class.las.iastate.edu:8080}
  mail:
    from: ${MAIL_FROM:309-dashboard@iastate.edu}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.springframework.security: DEBUG
