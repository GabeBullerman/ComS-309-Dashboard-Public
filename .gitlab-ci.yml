workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

stages:
  - test
  - quality

default:
  interruptible: true

pipeline-smoke:
  stage: test
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:3.20
  script:
    - echo "Pipeline smoke check"
    - echo "source=$CI_PIPELINE_SOURCE branch=$CI_COMMIT_REF_NAME sha=$CI_COMMIT_SHORT_SHA"

backend-tests:
  stage: test
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/maven:3.9.9-eclipse-temurin-17
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
    JWT_SECRET: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    GOOGLE_CLIENT_ID: "ci-test-client-id"
    GOOGLE_CLIENT_SECRET: "ci-test-client-secret"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .m2/repository
  before_script:
    - cd Backend
    - chmod +x mvnw
  script:
    - ./mvnw --batch-mode test
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - Backend/target/surefire-reports/
      - Backend/target/site/jacoco/

frontend-quality:
  stage: quality
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:20
  allow_failure: true
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run lint
    - npm run type-check
